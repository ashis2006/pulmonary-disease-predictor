{% extends "base.html" %}
{% block title %}Login - Respida AI{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-7 col-lg-5">
        <div class="main-card px-4 py-5 mt-4">
            <div class="text-center mb-5">
                <div class="d-inline-flex justify-content-center align-items-center mb-4" style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(99, 102, 241, 0.1)); border: 1px solid rgba(59, 130, 246, 0.2);">
                    <i class="fa-solid fa-user-doctor text-primary" style="font-size: 2.5rem;"></i>
                </div>
                <h2 class="fw-bold" style="letter-spacing: -0.5px;">Welcome Back</h2>
                <p class="text-secondary mt-2 fs-5">Sign in to your Respida account</p>
            </div>
            
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary mb-2 small text-uppercase" style="letter-spacing: 1px;">Username</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="fa-solid fa-user-astronaut"></i></span>
                            <input type="text" class="form-control" name="username" placeholder="Enter your username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-5">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label fw-bold text-secondary mb-0 small text-uppercase" style="letter-spacing: 1px;">Password</label>
                        </div>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="fa-solid fa-shield-halved"></i></span>
                            <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary-custom btn-lg w-100 py-3 fs-5">
                            Sign In <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            
            <div class="text-center mt-4 pt-3 border-top border-light">
                <span class="text-secondary">New to Respida? </span>
                <a href="{{ url_for('register') }}" class="fw-bold text-primary text-decoration-none">Create an Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
