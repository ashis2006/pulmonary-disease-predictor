{% extends "base.html" %}
{% block title %}Register - Respida AI{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-7 col-lg-5">
        <div class="main-card px-4 py-5 mt-4">
            <div class="text-center mb-5">
                <div class="d-inline-flex justify-content-center align-items-center mb-4" style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(6, 182, 212, 0.1)); border: 1px solid rgba(16, 185, 129, 0.2);">
                    <i class="fa-solid fa-user-plus text-success" style="font-size: 2.5rem;"></i>
                </div>
                <h2 class="fw-bold" style="letter-spacing: -0.5px;">Create an Account</h2>
                <p class="text-secondary mt-2 fs-5">Join Respida to track your health</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary mb-2 small text-uppercase" style="letter-spacing: 1px;">Username</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text"><i class="fa-solid fa-user-astronaut"></i></span>
                        <input type="text" class="form-control" name="username" placeholder="Choose a username" required autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary mb-2 small text-uppercase" style="letter-spacing: 1px;">Email (Optional)</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" class="form-control" name="email" placeholder="name@example.com">
                    </div>
                </div>
                
                <div class="mb-5">
                    <label class="form-label fw-bold text-secondary mb-2 small text-uppercase" style="letter-spacing: 1px;">Password</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text"><i class="fa-solid fa-shield-halved"></i></span>
                        <input type="password" class="form-control" name="password" placeholder="Create a strong password" required>
                    </div>
                </div>
                
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-primary-custom btn-lg w-100 py-3 fs-5" style="background: linear-gradient(135deg, #10b981, #0ea5e9); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.35);">
                        Sign Up <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top border-light">
                <span class="text-secondary">Already have an account? </span>
                <a href="{{ url_for('login') }}" class="fw-bold text-success text-decoration-none">Log in here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
