<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pulmonary Disease Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="mb-4 text-center text-primary">Pulmonary Disease Predictor</h2>

            <form method="POST">
                <div class="row">
                    {% for symptom in symptoms %}
                    <div class="col-md-6 mb-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="{{ symptom }}" name="{{ symptom }}">
                            <label class="form-check-label" for="{{ symptom }}">
                                {{ symptom.replace('_', ' ').capitalize() }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success">Predict Disease</button>
                </div>
            </form>

            {% if prediction %}
                <div class="alert alert-info mt-4 text-center">
                    <strong>Prediction:</strong> {{ prediction }}
                </div>

                <div class="mt-3 p-3 bg-white border rounded">
                    {% if description %}
                        <h5 class="text-secondary">Description</h5>
                        <p>{{ description }}</p>
                    {% endif %}

                    {% if treatment %}
                        <h5 class="text-secondary">Treatment Suggestions</h5>
                        <p>{{ treatment }}</p>
                    {% endif %}
                </div>
            {% endif %}

            <!-- ✨ View History Button -->
            <a href="/history" class="btn btn-outline-primary mt-3">View History</a>
        </div>
    </div>
</body>
</html>
